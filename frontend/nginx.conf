server {
  listen 80;
  server_name _;
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
  location /api/ {
    proxy_pass http://api-service.cloud-project.svc.cluster.local:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  location /auth/ {
    proxy_pass http://auth-service.cloud-project.svc.cluster.local:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
